name: Sync updates

on:
  push:
    branches: [main] # Ensures the workflow triggers on pushes to master and main

  schedule:
    # 18:00, 22:00, 02:00 SAST
     - cron: "0 16,20,0 * * *"

    # Once a day at 19:00 SAST
    # - cron: "0 09 * * *"

    # Every second day at 21:00 SAST
     - cron: "0 19 */3 * *"

  workflow_dispatch: # Allows manual triggering from the GitHub UI
permissions:
  contents: write # Grants permissions to write to the repo

jobs:
  update_commit:
    runs-on: ubuntu-latest # Specifies the runner

    steps:
      - name: Setup Debug Information
        run: echo "::debug::Triggered by ref = ${{github.ref}}"

      - name: Checkout Code
        uses: actions/checkout@v3 # Latest version for optimized performance
        with:
          persist-credentials: true # Ensures credentials are available for subsequent steps
          fetch-depth: 0 # Fetches all history for all branches and tags

      - name: Fetch Quote and Update Table
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          current_time=$(date '+%Y-%m-%d %H:%M:%S')

          # Prompt for generating motivational quotes for engineers
          prompt="Generate a single motivational quote for software engineers that:
          - Is under 20 words
          - Reflects technical truth and real engineering experiences
          - Provides emotional validation and encouragement
          - Sounds like a senior engineer's hard-earned insight
          - Avoids clichés, motivational fluff, and hustle culture
          - Topics: debugging, architecture, reliability, learning, technical debt, teamwork, failure, craftsmanship
          - Is witty and slightly wise

          Return ONLY the quote text, nothing else. No quotation marks."

          # Call OpenRouter API
          quote_response=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"openai/gpt-4o-mini\",
              \"messages\": [{\"role\": \"user\", \"content\": \"$prompt\"}],
              \"max_tokens\": 100
            }")

          quote=$(echo "$quote_response" | jq -r '.choices[0].message.content // "Unable to generate quote"')
          author="OpenRouter LLM"

          # Escape pipes and newlines in quote for markdown table
          quote=$(echo "$quote" | tr '\n' ' ' | sed 's/|/\|/g')

          # Initialize table if it doesn't exist
          if [ ! -f QUOTES.md ]; then
            echo "| Timestamp | Author | Quote |" > QUOTES.md
            echo "|-----------|--------|-------|" >> QUOTES.md
          fi

          # Append new entry
          echo "| $current_time | $author | $quote |" >> QUOTES.md

          # Keep TIMESTAMP.txt for backwards compatibility
          echo "Updated on $current_time" > TIMESTAMP.txt

      - name: Setup Git Configuration
        run: |
          git config user.email "${{ vars.GIT_USER_EMAIL || '65586580+Lo-rraine@users.noreply.github.com' }}"
          git config user.name "${{ vars.GIT_USER_NAME || 'Lo-rraine' }}"

      - name: Prepare Commit
        run: |
          commit_messages=("Update: ⏰" "Refresh: 🔄" "Renew: 🌟" "Revise: 📝" "Amend: 🛠" "Adjust: 🔧" "Change: 📈" "Modify: 🖊" "Transform: 🌀" "Revamp: 🌈")
          random_msg=${commit_messages[$RANDOM % ${#commit_messages[@]}]}

          git add TIMESTAMP.txt QUOTES.md
          git commit -m "$random_msg - $current_time" || echo "No changes to commit."

      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          directory: '.'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
