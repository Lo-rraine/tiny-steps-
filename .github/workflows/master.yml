name: Sync updates

on:
  push:
    branches:
      - main

  schedule:
    # 18:00, 22:00, 02:00 SAST
    - cron: "0 16,20,0 * * *"

    # Every 3 days at 21:00 SAST
    - cron: "0 19 */3 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Debug Information
        run: echo "::debug::Triggered by ref = ${{ github.ref }}"

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Fetch Quote and Update Table
        run: |
          current_time=$(date '+%Y-%m-%d %H:%M:%S')

          # Make timestamp available to later steps
          echo "CURRENT_TIME=$current_time" >> $GITHUB_ENV

          # Fetch quote from ZenQuotes
          quote_data=$(curl -s --max-time 10 https://zenquotes.io/api/random)

          echo "API Response:"
          echo "$quote_data"

          # Default fallback values
          author="Grace Hopper"
          quote="The most dangerous phrase in the language is: we've always done it this way."

          # Parse response if valid JSON
          if echo "$quote_data" | jq empty 2>/dev/null; then
            author=$(echo "$quote_data" | jq -r '.[0].a // "Grace Hopper"')
            quote=$(echo "$quote_data" | jq -r '.[0].q // "The most dangerous phrase in the language is: we have always done it this way."')
          fi

          # Escape markdown table characters
          quote=$(echo "$quote" | tr '\n' ' ' | sed 's/|/\\|/g')

          # Create table if it doesn't exist
          if [ ! -f QUOTES.md ]; then
            echo "# Programming Quotes of the Day" > QUOTES.md
            echo "" >> QUOTES.md
            echo "| Timestamp | Author | Quote |" >> QUOTES.md
            echo "|-----------|--------|-------|" >> QUOTES.md
          fi

          # Append quote
          echo "| $current_time | $author | $quote |" >> QUOTES.md

          # Backwards compatibility
          echo "Updated on $current_time" > TIMESTAMP.txt

      - name: Setup Git Configuration
        run: |
          git config user.email "65586580+Lo-rraine@users.noreply.github.com"
          git config user.name "Lo-rraine"

      - name: Prepare Commit
        run: |
          commit_messages=(
            "Update: ⏰"
            "Refresh: 🔄"
            "Renew: 🌟"
            "Revise: 📝"
            "Amend: 🛠"
            "Adjust: 🔧"
            "Change: 📈"
            "Modify: 🖊"
            "Transform: 🌀"
            "Revamp: 🌈"
          )

          random_msg=${commit_messages[$RANDOM % ${#commit_messages[@]}]}

          git add TIMESTAMP.txt QUOTES.md

          git commit -m "$random_msg - $CURRENT_TIME" || echo "No changes to commit."

      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
